name = "sevadal-cron"
main = "index.ts"
compatibility_date = "2024-09-23"

# ─── Cron schedule ─────────────────────────────────────────────────────────────
# Runs every 30 minutes. The /api/telegram-backup endpoint checks the
# configured IST backup time (set in Admin → Settings) and only sends
# within ±20 min of that time. Change time in admin UI — no redeploy needed.
[triggers]
crons = ["*/30 * * * *"]

# ─── Variables ────────────────────────────────────────────────────────────────
[vars]
# Replace with your actual live domain after deploying to Cloudflare Pages
APP_URL = "https://santnirankarisaralbranch.pages.dev"

# ─── Secrets (set via: wrangler secret put BACKUP_SECRET) ────────────────────
# BACKUP_SECRET — must match the BACKUP_SECRET env var in your main app
# Generate one: openssl rand -hex 16
